<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Hill School • Grade 9 Pre-Technical Studies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .scratch-embed { aspect-ratio: 16/9; }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-slate-50">

    <!-- HEADER -->
    <header class="bg-[#1e40af] text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-[#1e40af] text-2xl font-bold">CHS</div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">Central Hill School</h1>
                    <p class="text-xs text-blue-200 -mt-1">Grade 9 • Pre-Technical Studies</p>
                </div>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="flex bg-white/10 rounded-3xl p-1 text-sm">
                    <button onclick="switchRole('student')" id="student-tab"
                            class="px-6 py-2 rounded-3xl font-medium data-[active=true]:bg-white data-[active=true]:text-[#1e40af]">
                        <i class="fa-solid fa-user-graduate"></i> Student
                    </button>
                    <button onclick="checkTeacherAccess()" id="teacher-tab"
                            class="px-6 py-2 rounded-3xl font-medium data-[active=true]:bg-white data-[active=true]:text-[#1e40af]">
                        <i class="fa-solid fa-chalkboard-teacher"></i> Teacher
                    </button>
                </div>

                <div class="flex items-center gap-3">
                    <div id="user-info" class="text-right">
                        <p id="user-name" class="font-semibold text-sm">Welcome, Student</p>
                        <p id="user-role" class="text-xs text-blue-200">Grade 9 • Pre-Tech</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-8">
        
        <!-- STUDENT VIEW -->
        <div id="student-view">
            <div class="mb-8">
                <h2 class="text-4xl font-bold text-slate-800">Submit Your Scratch Project</h2>
                <p class="text-slate-600 mt-2">Pre-Technical Studies • Term 2, 2026 • Due: 18th April 2026</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Submission Form -->
                <div class="bg-white rounded-3xl shadow-xl p-8 card-hover">
                    <h3 class="text-xl font-semibold mb-6 flex items-center gap-2">
                        <i class="fa-solid fa-paper-plane text-[#1e40af]"></i>
                        Project Submission
                    </h3>
                    
                    <form id="submission-form" onsubmit="submitProject(event)">
                        <div class="space-y-6">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Your Full Name</label>
                                <input type="text" id="student-name" value="Alex Kimani" 
                                       class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:border-[#1e40af]">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Project Title</label>
                                <input type="text" id="project-title" placeholder="e.g. Interactive Quiz Game" required
                                       class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:border-[#1e40af]">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Scratch Project Link or ID</label>
                                <div class="flex">
                                    <input type="text" id="scratch-link" placeholder="https://scratch.mit.edu/projects/123456789/ or just the ID" required
                                           class="flex-1 px-4 py-3 border border-slate-200 rounded-l-2xl focus:outline-none focus:border-[#1e40af]">
                                    <button type="button" onclick="previewScratch()" 
                                            class="bg-[#1e40af] text-white px-6 rounded-r-2xl hover:bg-blue-800">
                                        Preview
                                    </button>
                                </div>
                            </div>

                            <div id="preview-area" class="hidden mt-4 rounded-2xl border border-slate-200 p-4">
                                <p class="text-xs uppercase font-medium text-slate-500 mb-2">Live Preview</p>
                                <iframe id="scratch-preview" class="scratch-embed w-full rounded-2xl" frameborder="0" allowfullscreen></iframe>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Project Description & Reflection</label>
                                <textarea id="description" rows="4" placeholder="What did you learn? Which blocks did you use? What would you improve?" required
                                          class="w-full px-4 py-3 border border-slate-200 rounded-3xl focus:outline-none focus:border-[#1e40af]"></textarea>
                            </div>

                            <button type="submit"
                                    class="w-full bg-[#1e40af] hover:bg-blue-700 text-white font-semibold py-4 rounded-3xl flex items-center justify-center gap-2">
                                <i class="fa-solid fa-paper-plane"></i>
                                Submit to Teacher
                            </button>
                        </div>
                    </form>
                </div>

                <!-- My Submissions -->
                <div>
                    <h3 class="font-semibold text-lg mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-folder-open"></i>
                        My Submissions
                    </h3>
                    <div id="my-submissions" class="space-y-4"></div>
                </div>
            </div>
        </div>

        <!-- TEACHER VIEW -->
        <div id="teacher-view" class="hidden">
            <div class="flex justify-between items-end mb-8">
                <div
